name: Elite GitHub Portfolio

on:
  schedule:
    - cron: "0 6 * * *"  # mise à jour chaque matin
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch GitHub repositories
        run: |
          curl -s https://api.github.com/users/TON_USERNAME/repos?per_page=100 > repos.json

      - name: Generate portfolio HTML
        run: |
          echo "<table align=\"center\">" > projects.md

          cat repos.json | jq -r '
          map(select(.fork == false)) 
          | sort_by(-.stargazers_count) 
          | .[0:6] 
          | . as $repos
          | range(0; length; 2) 
          | "<tr>

              <td width=\"50%\" align=\"center\" valign=\"top\">

                <h3>🚀 \($repos[.].name)</h3>

                \(if . == 0 then "<p>🏆 <b>Projet principal</b></p>" else "" end)

                <a href=\"\($repos[.].html_url)\">
                  <img src=\"https://opengraph.githubassets.com/1/\($repos[.].full_name)\" width=\"95%\" />
                </a>

                <br><br>

                <img src=\"https://img.shields.io/badge/Code-\($repos[.].language // "N/A")-blue?style=for-the-badge\" />
                <img src=\"https://img.shields.io/github/stars/\($repos[.].full_name)?style=for-the-badge\" />

                <br><br>

                <p>\($repos[.].description // "Projet en cours de développement")</p>

              </td>

              <td width=\"50%\" align=\"center\" valign=\"top\">

                \(if ($repos[.+1] != null) then
                  "<h3>🚀 \($repos[.+1].name)</h3>

                  <a href=\"\($repos[.+1].html_url)\">
                    <img src=\"https://opengraph.githubassets.com/1/\($repos[.+1].full_name)\" width=\"95%\" />
                  </a>

                  <br><br>

                  <img src=\"https://img.shields.io/badge/Code-\($repos[.+1].language // "N/A")-blue?style=for-the-badge\" />
                  <img src=\"https://img.shields.io/github/stars/\($repos[.+1].full_name)?style=for-the-badge\" />

                  <br><br>

                  <p>\($repos[.+1].description // "Projet en cours de développement")</p>"
                else "" end)

              </td>

            </tr>

            <tr><td colspan=\"2\"><br><br></td></tr>
          "
          ' >> projects.md

          echo "</table>" >> projects.md

      - name: Inject into README
        run: |
          awk '/<!--START_SECTION:projects-->/ {print; system("cat projects.md"); skip=1; next} 
               /<!--END_SECTION:projects-->/ {skip=0} 
               !skip' README.md > README.tmp

          mv README.tmp README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add README.md
          git commit -m "🚀 update elite portfolio"
          git push
