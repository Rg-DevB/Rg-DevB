name: Latest Projects

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch repos
        run: |
          curl -s https://api.github.com/users/Rg-DevB/repos?sort=updated > repos.json

      - name: Generate list
        run: |
          echo "### 🔥 Latest Projects" > latest.md
          jq -r '.[0:5][] | "- [" + .name + "](" + .html_url + ")"' repos.json >> latest.md

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add latest.md
          git commit -m "Update latest projects" || echo "No changes"
          git push
