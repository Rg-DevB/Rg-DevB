name: Weekly Stats

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats
        run: |
          echo "### 📅 Weekly Dev Stats" > weekly.md
          echo "- Commits this week: $(curl -s https://api.github.com/search/commits?q=author:Rg-DevB | jq '.total_count')" >> weekly.md

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add weekly.md
          git commit -m "Update weekly stats" || echo "No changes"
          git push
