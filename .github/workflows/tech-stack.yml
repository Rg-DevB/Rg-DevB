name: Tech Stack Auto

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  stack:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Analyze languages
        run: |
          curl -s https://api.github.com/users/Rg-DevB/repos > repos.json
          jq -r '.[].language' repos.json | sort | uniq -c | sort -nr > stack.txt

      - name: Commit
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add stack.txt
          git commit -m "Update tech stack" || echo "No changes"
          git push
