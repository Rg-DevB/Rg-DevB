name: Elite Portfolio Projects

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update-portfolio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch repositories
        run: |
          curl -s https://api.github.com/users/TON_USERNAME/repos?sort=updated > repos.json

      - name: Generate elite portfolio
        run: |
          echo "<table>" > projects.md

          cat repos.json | jq -r '
          map(select(.fork == false)) 
          | sort_by(-.stargazers_count) 
          | .[0:6] 
          | each
          | "
          <tr>
            <td width=\"50%\" align=\"center\">
              <h3>🚀 \(.name)</h3>
              <a href=\"\(.html_url)\">
                <img src=\"https://opengraph.githubassets.com/1/\(.full_name)\" />
              </a>
              <br><br>
              <img src=\"https://img.shields.io/badge/Code-\(.language // "N/A")-blue\" />
              <img src=\"https://img.shields.io/github/stars/\(.full_name)\" />
              <br><br>
              <p>\(.description // "Pas de description")</p>
            </td>
          </tr>
          "
          ' >> projects.md

          echo "</table>" >> projects.md

      - name: Inject into README
        run: |
          awk '/<!--START_SECTION:projects-->/ {print; system("cat projects.md"); skip=1; next} 
               /<!--END_SECTION:projects-->/ {skip=0} 
               !skip' README.md > README.tmp

          mv README.tmp README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "update elite portfolio"
          git push
